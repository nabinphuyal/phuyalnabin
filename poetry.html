<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life-Time Secure Kabita Note & Vault</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #3498db; --vault: #0d1117; --accent: #e74c3c; --notice-bg: #1e293b; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #f4f7f6; color: #333; line-height: 1.6; }
        
        /* UI Components */
        .header { background: var(--primary); color: white; padding: 20px; text-align: center; border-bottom: 4px solid var(--secondary); }
        .container { max-width: 800px; margin: auto; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; margin-top: 10px; }
        .btn-blue { background: var(--secondary); color: white; }
        .btn-green { background: #27ae60; color: white; }
        .btn-red { background: var(--accent); color: white; }

        /* Auth Section */
        #auth-section { max-width: 400px; margin: 50px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }

        /* Vault UI */
        #vault-section { display: none; background: var(--vault); color: #e2e8f0; min-height: 100vh; position: fixed; top: 0; left: 0; width: 100%; z-index: 1000; padding: 20px; overflow-y: auto; }
        .vault-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; margin-top: 20px; }
        .vault-item { width: 100%; height: 140px; object-fit: cover; border-radius: 10px; border: 1px solid #30363d; cursor: pointer; background: #000; }
        
        /* Full Screen Preview (LightBox) */
        #preview-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; }
        #preview-content { max-width: 90%; max-height: 90%; border-radius: 10px; }
        .close-preview { position: absolute; top: 20px; right: 30px; color: white; font-size: 40px; cursor: pointer; font-weight: bold; }

        /* Notice Box */
        .notice-box { background: var(--notice-bg); border-left: 4px solid var(--secondary); padding: 15px; border-radius: 8px; margin-bottom: 20px; font-size: 13px; color: #cbd5e1; }

        #main-app { display: none; }
        .poem-item { background: #fff; padding: 15px; border-radius: 8px; margin-top: 15px; border-left: 5px solid var(--secondary); position: relative; }
        .del-btn { position: absolute; top: 10px; right: 10px; color: #ccc; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

<div id="preview-overlay">
    <span class="close-preview" onclick="closePreview()">&times;</span>
    <div id="preview-media-container" style="display:flex; justify-content:center; align-items:center; width:100%; height:100%;"></div>
</div>

<div id="auth-section">
    <h2 id="auth-title" style="text-align:center; margin-bottom:20px;">🔒 Life-Time Vault</h2>
    <div id="login-fields">
        <input type="text" id="l-phone" placeholder="फोन नम्बर">
        <input type="password" id="l-pass" placeholder="पासवर्ड">
        <button class="btn btn-blue" onclick="login()">Login</button>
        <p style="text-align:center; margin-top:15px; font-size:14px;">खाता छैन? <a href="#" onclick="toggleAuth(true)">Register</a></p>
    </div>
    
    <div id="signup-fields" style="display:none">
        <input type="text" id="s-name" placeholder="पूरा नाम">
        <input type="text" id="s-dob" placeholder="जन्म मिति (जस्तै: 20550101)">
        <input type="text" id="s-phone" placeholder="फोन नम्बर">
        <input type="password" id="s-pass" placeholder="पासवर्ड">
        <button class="btn btn-blue" onclick="signup()">Create Account</button>
        <p style="text-align:center; margin-top:15px; font-size:14px;">खाता छ? <a href="#" onclick="toggleAuth(false)">Login</a></p>
    </div>

    <div style="margin-top:25px; border-top: 1px solid #eee; padding-top: 15px;">
        <p style="font-size:11px; color:#666; margin-bottom:10px;"><b>Backup Restore:</b></p>
        <input type="file" id="importFile" accept=".json" style="font-size:12px;">
        <button class="btn btn-green" style="font-size:12px; padding:8px;" onclick="importData()">Restore Data</button>
    </div>
</div>

<div id="main-app">
    <div class="header">
        <h1>My Diary & Vault</h1>
        <p id="welcome-msg"></p>
    </div>
    <div class="container">
        <div class="card">
            <h3>लेख्नुहोस्...</h3>
            <input type="text" id="p-title" placeholder="शीर्षक">
            <textarea id="p-body" placeholder="तपाईंको मनको कुरा यहाँ लेख्नुहोस्..." rows="4"></textarea>
            <button class="btn btn-blue" onclick="addPoem()">Save Note</button>
        </div>

        <div id="poem-list"></div>

        <button class="btn" style="background:#6c5ce7; color:white; height:60px; font-size:18px; margin-top:20px;" onclick="openVault()">🔐 OPEN SECRET VAULT</button>
        <button class="btn btn-red" onclick="logout()" style="margin-top:30px; opacity:0.6;">Logout</button>
    </div>
</div>

<div id="vault-section">
    <div class="container">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom:20px;">
            <h2 style="color:var(--secondary)">🔒 Private Vault</h2>
            <button class="btn btn-red" style="width:100px; margin:0;" onclick="closeVault()">Exit</button>
        </div>

        <div class="notice-box">
            <p>यो भित्रको फोटो/भिडियोमा क्लिक गरेर हेर्न सक्नुहुन्छ।</p>
        </div>

        <div class="card" style="background:#1c2128; border:1px solid #30363d;">
            <p style="color:#aaa; font-size:12px; margin-bottom:10px;">फोटो वा भिडियो थप्नुहोस्:</p>
            <input type="file" id="v-file" accept="image/*,video/*" multiple onchange="saveVaultFile()" style="color:white; font-size:12px;">
        </div>

        <div class="vault-grid" id="vault-grid"></div>

        <div style="margin-top:40px; text-align:center;">
            <button class="btn btn-green" onclick="exportData()">📥 Download Life-Time Backup File</button>
        </div>
    </div>
</div>

<script>
    let currentUser = null;

    function toggleAuth(isSignup) {
        document.getElementById('login-fields').style.display = isSignup ? 'none' : 'block';
        document.getElementById('signup-fields').style.display = isSignup ? 'block' : 'none';
        document.getElementById('auth-title').innerText = isSignup ? 'Register' : '🔒 Secure Login';
    }

    function signup() {
        const name = document.getElementById('s-name').value;
        const dob = document.getElementById('s-dob').value;
        const phone = document.getElementById('s-phone').value;
        const pass = document.getElementById('s-pass').value;
        if(!name || !phone || !pass || !dob) return alert("सबै विवरण भर्नुहोस्!");
        let users = JSON.parse(localStorage.getItem('users') || '[]');
        if(users.find(u => u.phone === phone)) return alert("यो नम्बरमा आईडी छ!");
        users.push({ name, phone, pass, dob });
        localStorage.setItem('users', JSON.stringify(users));
        alert("Success! Now Login.");
        toggleAuth(false);
    }

    function login() {
        const phone = document.getElementById('l-phone').value;
        const pass = document.getElementById('l-pass').value;
        const users = JSON.parse(localStorage.getItem('users') || '[]');
        const user = users.find(u => u.phone === phone && u.pass === pass);
        if(user) {
            currentUser = user;
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('welcome-msg').innerText = "नमस्ते, " + user.name;
            renderPoems();
        } else alert("Invalid Login!");
    }

    function addPoem() {
        const title = document.getElementById('p-title').value;
        const body = document.getElementById('p-body').value;
        if(!title || !body) return;
        let allData = JSON.parse(localStorage.getItem('app_data') || '{}');
        if(!allData[currentUser.phone]) allData[currentUser.phone] = { poems: [], vault: [], vaultPin: null };
        allData[currentUser.phone].poems.unshift({ title, body, id: Date.now() });
        localStorage.setItem('app_data', JSON.stringify(allData));
        renderPoems();
        document.getElementById('p-title').value = '';
        document.getElementById('p-body').value = '';
    }

    function renderPoems() {
        const allData = JSON.parse(localStorage.getItem('app_data') || '{}');
        const poems = allData[currentUser.phone]?.poems || [];
        document.getElementById('poem-list').innerHTML = poems.map(p => `
            <div class="poem-item">
                <strong>${p.title}</strong>
                <p style="margin-top:5px; white-space:pre-wrap; font-size:14px;">${p.body}</p>
            </div>
        `).join('');
    }

    function openVault() {
        let allData = JSON.parse(localStorage.getItem('app_data') || '{}');
        if(!allData[currentUser.phone]) allData[currentUser.phone] = { poems: [], vault: [], vaultPin: null };
        let userAppData = allData[currentUser.phone];

        if (!userAppData.vaultPin) {
            let newPin = prompt("Set a new 4-digit Secret PIN for Vault:");
            if (newPin && newPin.length === 4) {
                userAppData.vaultPin = newPin;
                localStorage.setItem('app_data', JSON.stringify(allData));
                alert("Vault PIN Set!");
            } else { return alert("Please enter 4 digits!"); }
        }

        let pin = prompt("Enter Vault PIN (Or type 'FORGOT'):");
        if (pin === userAppData.vaultPin) {
            document.getElementById('vault-section').style.display = 'block';
            renderVault();
        } else if (pin && pin.toUpperCase() === 'FORGOT') {
            let fName = prompt("Enter Your Full Name:");
            let fDob = prompt("Enter Your DOB Number:");
            if (fName === currentUser.name && fDob === currentUser.dob) {
                alert("Your Vault PIN is: " + userAppData.vaultPin);
            } else { alert("Verification Failed!"); }
        } else { alert("Wrong PIN!"); }
    }

    function closeVault() { document.getElementById('vault-section').style.display = 'none'; }

    function saveVaultFile() {
        const files = document.getElementById('v-file').files;
        let allData = JSON.parse(localStorage.getItem('app_data') || '{}');
        Array.from(files).forEach(file => {
            const reader = new FileReader();
            reader.onload = (e) => {
                allData[currentUser.phone].vault.push({ src: e.target.result, type: file.type });
                localStorage.setItem('app_data', JSON.stringify(allData));
                renderVault();
            };
            reader.readAsDataURL(file);
        });
    }

    function renderVault() {
        const allData = JSON.parse(localStorage.getItem('app_data') || '{}');
        const items = allData[currentUser.phone]?.vault || [];
        const grid = document.getElementById('vault-grid');
        grid.innerHTML = items.map(item => {
            return item.type.includes('image') 
                ? `<img src="${item.src}" class="vault-item" onclick="viewFull('${item.src}', 'img')">`
                : `<video src="${item.src}" class="vault-item" onclick="viewFull('${item.src}', 'vid')"></video>`;
        }).join('');
    }

    function viewFull(src, type) {
        const overlay = document.getElementById('preview-overlay');
        const container = document.getElementById('preview-media-container');
        overlay.style.display = 'flex';
        container.innerHTML = type === 'img' 
            ? `<img src="${src}" id="preview-content">` 
            : `<video src="${src}" id="preview-content" controls autoplay></video>`;
    }

    function closePreview() { 
        document.getElementById('preview-overlay').style.display = 'none';
        document.getElementById('preview-media-container').innerHTML = '';
    }

    function exportData() {
        const data = { users: localStorage.getItem('users'), app_data: localStorage.getItem('app_data') };
        const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `My_Secure_Vault_Backup.json`;
        a.click();
    }

    function importData() {
        const file = document.getElementById('importFile').files[0];
        if(!file) return alert("Select file!");
        const reader = new FileReader();
        reader.onload = (e) => {
            const d = JSON.parse(e.target.result);
            localStorage.setItem('users', d.users);
            localStorage.setItem('app_data', d.app_data);
            alert("Data Restored!"); location.reload();
        };
        reader.readAsText(file);
    }

    function logout() { location.reload(); }
</script>
</body>
</html>
