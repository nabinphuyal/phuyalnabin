<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>नेपाली भल्ट 🔐</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(145deg, #0b1c2f, #132b3c);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .app {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 32px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        h2 { color: #1e3c72; margin-bottom: 20px; }
        input, button, textarea {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border-radius: 50px;
            border: 1px solid #ccc;
            font-size: 16px;
        }
        textarea { border-radius: 15px; resize: none; }
        button {
            background: #1e3c72;
            color: white;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background: #2a4f8c; }
        .hidden { display: none !important; }
        .forget-link {
            text-align: right;
            color: #1e3c72;
            cursor: pointer;
            margin: 8px 0;
            text-decoration: underline;
        }
        .message {
            padding: 12px;
            border-radius: 50px;
            margin: 10px 0;
            text-align: center;
            font-size: 14px;
        }
        .success { background: #e8f5e9; color: #2e7d32; }
        .error { background: #ffebee; color: #c62828; }
        .note-card { background: #f5f5f5; padding: 12px; margin: 8px 0; border-radius: 12px; border-left: 5px solid #1e3c72; }
    </style>
</head>
<body>
    <div class="app">
        <div id="recaptcha-container"></div>

        <div id="loginSection">
            <h2>🔐 नेपाली भल्ट</h2>
            <input type="email" id="loginEmail" placeholder="इमेल ठेगाना">
            <input type="password" id="loginPassword" placeholder="पासवर्ड">
            <button id="loginBtn">लगइन गर्नुहोस्</button>
            <div class="forget-link" id="forgetLink">पासवर्ड बिर्सनुभयो?</div>
            <p style="text-align:center; margin-top:16px;">
                खाता छैन? <strong id="showRegisterBtn" style="color:#1e3c72; cursor:pointer;">खाता खोल्नुहोस्</strong>
            </p>
        </div>

        <div id="registerSection" class="hidden">
            <h2>✍️ खाता खोल्नुहोस्</h2>
            <input type="text" id="regName" placeholder="पूरा नाम">
            <input type="text" id="regPhone" placeholder="फोन नम्बर (उदा: +97798...)">
            <input type="email" id="regEmail" placeholder="इमेल">
            <input type="date" id="regDob">
            <input type="password" id="regPassword" placeholder="नयाँ पासवर्ड">
            <button id="sendOtpBtn">OTP पठाउनुहोस्</button>
            <input type="text" id="regOtp" placeholder="प्राप्त OTP कोड हाल्नुहोस्" class="hidden">
            <button id="createAccountBtn" class="hidden">खाता सुरक्षित गर्नुहोस्</button>
            <p style="text-align:center; margin-top:16px;">
                <strong id="backToLoginBtn" style="color:#1e3c72; cursor:pointer;">← लगइन पेजमा जानुहोस्</strong>
            </p>
        </div>

        <div id="forgetSection" class="hidden">
            <h2>🔑 पासवर्ड रिसेट</h2>
            <p style="font-size: 13px; color: #666;">आफ्नो इमेल हाल्नुहोस्, हामी रिसेट लिंक पठाउनेछौं।</p>
            <input type="email" id="forgetEmail" placeholder="आफ्नो इमेल ठेगाना">
            <button id="resetPasswordBtn">रिसेट लिंक पठाउनुहोस्</button>
            <p style="text-align:center; margin-top:16px;">
                <strong id="backToLoginFromForgetBtn" style="color:#1e3c72; cursor:pointer;">← लगइन पेजमा जानुहोस्</strong>
            </p>
        </div>

        <div id="mainApp" class="hidden">
            <div style="display:flex; justify-content:space-between; align-items: center;">
                <h2>🗄️ मेरो भल्ट</h2>
                <button id="logoutBtn" style="width:auto; background:crimson; padding: 8px 15px; border-radius: 10px;">लगआउट</button>
            </div>
            <p id="welcomeMsg" style="background:#e3f2fd; padding:12px; border-radius:15px; margin-bottom: 15px;"></p>
            
            <h3>📝 नयाँ नोट</h3>
            <textarea id="noteContent" rows="3" placeholder="यहाँ केही लेख्नुहोस्..."></textarea>
            <button id="saveNoteBtn">भल्टमा सेभ गर्नुहोस्</button>
            
            <div id="notesList" style="margin-top:20px;">
                <p style="color: #999; text-align: center;">नोटहरू लोड हुँदैछ...</p>
            </div>
        </div>

        <div id="globalMessage"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { 
            getAuth, RecaptchaVerifier, signInWithPhoneNumber,
            signInWithEmailAndPassword, createUserWithEmailAndPassword,
            sendPasswordResetEmail, signOut, onAuthStateChanged 
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import {
            getFirestore, doc, setDoc, getDoc, collection,
            addDoc, query, orderBy, onSnapshot, serverTimestamp
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDV7fx22nrD_lQ_52NYa_D8gWqSO-usXj4",
            authDomain: "nepali-valut-d0c28.firebaseapp.com",
            projectId: "nepali-valut-d0c28",
            storageBucket: "nepali-valut-d0c28.firebasestorage.app",
            messagingSenderId: "1011771345861",
            appId: "1:1011771345861:web:1fd6a024702355f6f299ac"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let confirmationResult = null;
        let currentUser = null;

        // UI Elements
        const sections = {
            login: document.getElementById('loginSection'),
            register: document.getElementById('registerSection'),
            forget: document.getElementById('forgetSection'),
            main: document.getElementById('mainApp')
        };

        function showSection(name) {
            Object.keys(sections).forEach(key => {
                sections[key].classList.add('hidden');
            });
            sections[name].classList.remove('hidden');
        }

        // Navigation
        document.getElementById('showRegisterBtn').onclick = () => showSection('register');
        document.getElementById('backToLoginBtn').onclick = () => showSection('login');
        document.getElementById('forgetLink').onclick = () => showSection('forget');
        document.getElementById('backToLoginFromForgetBtn').onclick = () => showSection('login');

        // reCAPTCHA
        const initRecaptcha = () => {
            if (!window.recaptchaVerifier) {
                window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
                    'size': 'invisible'
                });
            }
        };

        // Send OTP
        document.getElementById('sendOtpBtn').onclick = async () => {
            const phone = document.getElementById('regPhone').value.trim();
            if (!phone.startsWith('+')) {
                alert('+977 सहित पूरा नम्बर हाल्नुहोस्');
                return;
            }
            initRecaptcha();
            try {
                confirmationResult = await signInWithPhoneNumber(auth, phone, window.recaptchaVerifier);
                showMessage('✅ OTP फोनमा पठाइयो', 'success');
                document.getElementById('regOtp').classList.remove('hidden');
                document.getElementById('createAccountBtn').classList.remove('hidden');
                document.getElementById('sendOtpBtn').classList.add('hidden');
            } catch(e) {
                showMessage('❌ त्रुटि: ' + e.message, 'error');
            }
        };

        // Create Account
        document.getElementById('createAccountBtn').onclick = async () => {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const otp = document.getElementById('regOtp').value;

            if (!name || !email || !password || !otp) {
                alert('कृपया सबै फिल्डहरू भर्नुहोस्');
                return;
            }

            try {
                // Verify OTP first
                await confirmationResult.confirm(otp);
                
                // Then Create Email User
                const userCred = await createUserWithEmailAndPassword(auth, email, password);
                
                await setDoc(doc(db, 'users', userCred.user.uid), {
                    fullName: name,
                    email: email,
                    createdAt: serverTimestamp()
                });
                
                showMessage('✅ खाता सफल भयो!', 'success');
            } catch(e) {
                showMessage('❌ ' + e.message, 'error');
            }
        };

        // Login
        document.getElementById('loginBtn').onclick = async () => {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch(e) {
                showMessage('❌ इमेल वा पासवर्ड गलत छ', 'error');
            }
        };

        // Reset Password
        document.getElementById('resetPasswordBtn').onclick = async () => {
            const email = document.getElementById('forgetEmail').value;
            if(!email) return alert("इमेल हाल्नुहोस्");
            try {
                await sendPasswordResetEmail(auth, email);
                showMessage('✅ रिसेट लिंक इमेलमा पठाइयो', 'success');
            } catch(e) {
                showMessage('❌ त्रुटि: ' + e.message, 'error');
            }
        };

        // Auth State Handler
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                showSection('main');
                const userDoc = await getDoc(doc(db, 'users', user.uid));
                if (userDoc.exists()) {
                    document.getElementById('welcomeMsg').innerText = `स्वागतम्, ${userDoc.data().fullName} 🙏`;
                    loadNotes();
                }
            } else {
                showSection('login');
            }
        });

        // Load Notes
        function loadNotes() {
            const q = query(
                collection(db, 'users', currentUser.uid, 'notes'),
                orderBy('timestamp', 'desc')
            );
            onSnapshot(q, (snap) => {
                let html = '';
                snap.forEach(doc => {
                    html += `<div class="note-card">${doc.data().content}</div>`;
                });
                document.getElementById('notesList').innerHTML = html || '<p style="text-align:center; color:#999;">कुनै नोट सुरक्षित छैन।</p>';
            });
        }

        // Save Note
        document.getElementById('saveNoteBtn').onclick = async () => {
            const content = document.getElementById('noteContent').value.trim();
            if (!content) return alert('केही त लेख्नुहोस्!');
            
            try {
                await addDoc(collection(db, 'users', currentUser.uid, 'notes'), {
                    content,
                    timestamp: serverTimestamp()
                });
                document.getElementById('noteContent').value = '';
                showMessage('✅ नोट सुरक्षित गरियो', 'success');
            } catch(e) {
                showMessage('❌ सेभ गर्न सकिएन', 'error');
            }
        };

        // Logout
        document.getElementById('logoutBtn').onclick = () => signOut(auth);

        function showMessage(msg, type) {
            const globalMsg = document.getElementById('globalMessage');
            globalMsg.innerHTML = `<div class="message ${type}">${msg}</div>`;
            setTimeout(() => globalMsg.innerHTML = '', 4000);
        }
    </script>
</body>
</html>
