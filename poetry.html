<!DOCTYPE html>
<html lang="ne">
<head>
  <meta charset="UTF-8" />
  <title>🔐 Secure Poetry Diary & Vault (Firebase)</title>
  <style>
    body{margin:0;font-family:Arial;background:#667eea}
    .container{max-width:1100px;margin:auto;padding:20px}
    .hidden{display:none}
    .card{background:#fff;border-radius:12px;padding:20px;margin-bottom:20px}
    button{padding:8px 14px;border:none;border-radius:6px;cursor:pointer}
    input,textarea{width:100%;padding:8px;margin:6px 0}
    .note{border-left:4px solid #667eea;padding:10px;margin:10px 0}
    .vault-item{width:120px;height:120px;overflow:hidden;position:relative}
    .vault-item img,.vault-item video{width:100%;height:100%;object-fit:cover}
    .actions{display:flex;gap:5px;margin-top:5px}
  </style>
</head>
<body>
  <div class="container">

    <!-- LOGIN -->
    <div id="loginCard" class="card">
      <h2>🔐 Login with Phone</h2>
      <input id="phone" placeholder="+977-XXXXXXXXXX" />
      <button onclick="sendOTP()">Send OTP</button>
      <div id="recaptcha-container"></div>

      <div id="otpSection" style="display:none; margin-top: 10px;">
        <input id="otp" placeholder="Enter OTP" />
        <button onclick="verifyOTP()">Verify OTP</button>
      </div>
    </div>

    <!-- APP -->
    <div id="app" class="hidden">
      <div class="card">
        <h3>📝 Poetry / Notes</h3>
        <input id="title" placeholder="Title" />
        <input id="tag" placeholder="Tag (love, pain...)" />
        <textarea id="content" placeholder="Write..."></textarea>
        <button onclick="saveNote()">Save</button>
        <input placeholder="🔍 Search" oninput="searchNotes(this.value)" />
        <div id="notes"></div>
      </div>

      <div class="card">
        <h3>🔐 Vault</h3>
        <button onclick="openVault()">Open / Add Media</button>
        <div id="vault" style="display:flex;gap:10px;flex-wrap:wrap"></div>
      </div>

      <button onclick="logout()">Logout</button>
    </div>

  </div>

  <!-- Firebase and app logic script is here (paste the script from Step 1) -->
</body>
</html>
