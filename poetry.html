<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>नेपाली भल्ट 🔐</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(145deg, #0b1c2f, #132b3c);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .app {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 32px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        h2 { color: #1e3c72; margin-bottom: 20px; }
        input, button {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border-radius: 50px;
            border: 1px solid #ccc;
            font-size: 16px;
        }
        button {
            background: #1e3c72;
            color: white;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }
        button:hover { background: #2a4f8c; }
        .hidden { display: none; }
        .forget-link {
            text-align: right;
            color: #1e3c72;
            cursor: pointer;
            margin: 8px 0;
            text-decoration: underline;
        }
        .message {
            padding: 12px;
            border-radius: 50px;
            margin: 10px 0;
            text-align: center;
        }
        .success { background: #e8f5e9; color: #2e7d32; }
        .error { background: #ffebee; color: #c62828; }
    </style>
</head>
<body>
    <div class="app">
        <div id="recaptcha-container"></div>

        <!-- Login Section -->
        <div id="loginSection">
            <h2>🔐 नेपाली भल्ट</h2>
            <input type="email" id="loginEmail" placeholder="इमेल ठेगाना">
            <input type="password" id="loginPassword" placeholder="पासवर्ड">
            <button id="loginBtn">लगइन गर्नुहोस्</button>
            <div class="forget-link" id="forgetLink">पासवर्ड बिर्सनुभयो?</div>
            <p style="text-align:center; margin-top:16px;">
                खाता छैन? <strong id="showRegisterBtn" style="color:#1e3c72; cursor:pointer;">खाता खोल्नुहोस्</strong>
            </p>
        </div>

        <!-- Register Section -->
        <div id="registerSection" class="hidden">
            <h2>✍️ खाता खोल्नुहोस्</h2>
            <input type="text" id="regName" placeholder="पूरा नाम">
            <input type="text" id="regPhone" placeholder="फोन नम्बर +97798...">
            <input type="email" id="regEmail" placeholder="इमेल (वैकल्पिक)">
            <input type="date" id="regDob">
            <input type="password" id="regPassword" placeholder="पासवर्ड">
            <button id="sendOtpBtn">OTP पठाउनुहोस्</button>
            <input type="text" id="regOtp" placeholder="OTP कोड">
            <button id="createAccountBtn">खाता खोल्नुहोस्</button>
            <p style="text-align:center; margin-top:16px;">
                <strong id="backToLoginBtn" style="color:#1e3c72; cursor:pointer;">← लगइन पेजमा जानुहोस्</strong>
            </p>
        </div>

        <!-- Forget Password Section -->
        <div id="forgetSection" class="hidden">
            <h2>🔑 पासवर्ड रिसेट</h2>
            <input type="text" id="forgetPhone" placeholder="फोन नम्बर +97798...">
            <button id="sendForgetOtpBtn">OTP पठाउनुहोस्</button>
            <input type="text" id="forgetOtp" placeholder="OTP कोड">
            <input type="password" id="newPassword" placeholder="नयाँ पासवर्ड">
            <button id="resetPasswordBtn">रिसेट गर्नुहोस्</button>
            <p style="text-align:center; margin-top:16px;">
                <strong id="backToLoginFromForgetBtn" style="color:#1e3c72; cursor:pointer;">← लगइन पेजमा जानुहोस्</strong>
            </p>
        </div>

        <!-- Main App (Notes) -->
        <div id="mainApp" class="hidden">
            <div style="display:flex; justify-content:space-between;">
                <h2>🗄️ मेरो भल्ट</h2>
                <button id="logoutBtn" style="width:auto; background:crimson;">लगआउट</button>
            </div>
            <p id="welcomeMsg" style="background:#e3f2fd; padding:12px; border-radius:50px;"></p>
            
            <h3>📝 नोट लेख्नुहोस्</h3>
            <textarea id="noteContent" rows="4" style="width:100%; padding:12px;"></textarea>
            <button id="saveNoteBtn">सेभ गर्नुहोस्</button>
            <div id="notesList" style="margin-top:20px;"></div>
        </div>

        <div id="globalMessage"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { 
            getAuth, RecaptchaVerifier, signInWithPhoneNumber,
            signInWithEmailAndPassword, createUserWithEmailAndPassword,
            signOut, onAuthStateChanged 
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import {
            getFirestore, doc, setDoc, getDoc, collection,
            addDoc, query, orderBy, onSnapshot, serverTimestamp
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDV7fx22nrD_lQ_52NYa_D8gWqSO-usXj4",
            authDomain: "nepali-valut-d0c28.firebaseapp.com",
            projectId: "nepali-valut-d0c28",
            storageBucket: "nepali-valut-d0c28.firebasestorage.app",
            messagingSenderId: "1011771345861",
            appId: "1:1011771345861:web:1fd6a024702355f6f299ac"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.confirmationResult = null;
        let currentUser = null;

        // UI Elements
        const loginSection = document.getElementById('loginSection');
        const registerSection = document.getElementById('registerSection');
        const forgetSection = document.getElementById('forgetSection');
        const mainApp = document.getElementById('mainApp');
        const globalMsg = document.getElementById('globalMessage');

        // Tab Switching
        document.getElementById('showRegisterBtn').onclick = () => {
            loginSection.classList.add('hidden');
            registerSection.classList.remove('hidden');
        };
        document.getElementById('backToLoginBtn').onclick = () => {
            registerSection.classList.add('hidden');
            loginSection.classList.remove('hidden');
        };
        document.getElementById('forgetLink').onclick = () => {
            loginSection.classList.add('hidden');
            forgetSection.classList.remove('hidden');
        };
        document.getElementById('backToLoginFromForgetBtn').onclick = () => {
            forgetSection.classList.add('hidden');
            loginSection.classList.remove('hidden');
        };

        // reCAPTCHA
        window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
            size: 'normal'
        });

        // Send OTP
        document.getElementById('sendOtpBtn').onclick = async () => {
            const phone = document.getElementById('regPhone').value.trim();
            if (!phone.startsWith('+')) {
                alert('+977 सहित फोन नम्बर हाल्नुहोस्');
                return;
            }
            try {
                window.confirmationResult = await signInWithPhoneNumber(auth, phone, window.recaptchaVerifier);
                showMessage('✅ OTP पठाइयो', 'success');
            } catch(e) {
                showMessage('❌ ' + e.message, 'error');
            }
        };

        // Create Account
        document.getElementById('createAccountBtn').onclick = async () => {
            const name = document.getElementById('regName').value;
            const phone = document.getElementById('regPhone').value;
            const email = document.getElementById('regEmail').value;
            const dob = document.getElementById('regDob').value;
            const password = document.getElementById('regPassword').value;
            const otp = document.getElementById('regOtp').value;

            if (!name || !phone || !dob || !password || !otp) {
                alert('सबै * फिल्ड भर्नुहोस्');
                return;
            }

            try {
                const result = await window.confirmationResult.confirm(otp);
                const user = result.user;
                
                const emailUser = await createUserWithEmailAndPassword(
                    auth,
                    email || ${user.phoneNumber}@vault.np,
                    password
                );
                
                await setDoc(doc(db, 'users', emailUser.user.uid), {
                    fullName: name,
                    phone,
                    email: email || '',
                    dob,
                    createdAt: serverTimestamp()
                });
                
                showMessage('✅ खाता खोलियो!', 'success');
                registerSection.classList.add('hidden');
                loginSection.classList.remove('hidden');
            } catch(e) {
                showMessage('❌ ' + e.message, 'error');
            }
        };

        // Login
        document.getElementById('loginBtn').onclick = async () => {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch(e) {
                showMessage('❌ इमेल वा पासवर्ड गलत', 'error');
            }
        };

        // Auth State
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                loginSection.classList.add('hidden');
                registerSection.classList.add('hidden');
                forgetSection.classList.add('hidden');
                mainApp.classList.remove('hidden');
                
                const userDoc = await getDoc(doc(db, 'users', user.uid));
                if (userDoc.exists()) {
                    document.getElementById('welcomeMsg').innerText = 
                        स्वागतम्, ${userDoc.data().fullName} 🙏;
                    loadNotes();
                }
            } else {
                loginSection.classList.remove('hidden');
                mainApp.classList.add('hidden');
            }
        });

        // Load Notes
        function loadNotes() {
            const q = query(
                collection(db, 'users', currentUser.uid, 'notes'),
                orderBy('timestamp', 'desc')
            );
            onSnapshot(q, (snap) => {
                let html = '';
                snap.forEach(doc => {
                    html += `<div style="background:#f5f5f5; padding:12px; margin:8px 0; border-radius:12px;">
                        ${doc.data().content}
                    </div>`;
                });
                document.getElementById('notesList').innerHTML = html || '<p>कुनै नोट छैन</p>';
            });
        }

        // Save Note
        document.getElementById('saveNoteBtn').onclick = async () => {
            const content = document.getElementById('noteContent').value.trim();
            if (!content) return alert('नोट लेख्नुहोस्');
            
            await addDoc(collection(db, 'users', currentUser.uid, 'notes'), {
                content,
                timestamp: serverTimestamp()
            });
            document.getElementById('noteContent').value = '';
            showMessage('✅ नोट सेभ भयो', 'success');
        };

        // Logout
        document.getElementById('logoutBtn').onclick = () => signOut(auth);

        function showMessage(msg, type) {
            globalMsg.innerHTML = <div class="message ${type}">${msg}</div>;
            setTimeout(() => globalMsg.innerHTML = '', 3000);
        }
    </script>
</body>
</html>
