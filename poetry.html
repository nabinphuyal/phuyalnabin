<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>स्मार्ट नेपाली भल्ट 🔐</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/css/intlTelInput.css">
    <style>
        :root { --primary: #1e3c72; --secondary: #2a4f8c; --accent: #ff4757; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background: #0f2027; background: linear-gradient(to right, #2c5364, #203a43, #0f2027); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 15px; }
        
        .container { background: white; width: 100%; max-width: 450px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); padding: 30px; overflow: hidden; }
        
        h2 { color: var(--primary); text-align: center; margin-bottom: 20px; font-size: 24px; }
        input, textarea, button { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 1px solid #ddd; font-size: 16px; outline: none; }
        
        button { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        button:hover { background: var(--secondary); transform: translateY(-2px); }
        button:active { transform: translateY(0); }

        .hidden { display: none !important; }
        .iti { width: 100%; margin: 10px 0; } /* Fix for phone input */
        
        .nav-header { display: flex; justify-content: space-between; align-items: center; background: #f8f9fa; padding: 10px; border-radius: 10px; margin-bottom: 15px; }
        .vault-btn { background: #f39c12; color: white; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: bold; }

        .msg { padding: 12px; border-radius: 10px; text-align: center; margin: 10px 0; font-size: 14px; animation: fadeIn 0.5s; }
        .error { background: #ffebee; color: #c62828; border: 1px solid #ef9a9a; }
        .success { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <div id="recaptcha-container"></div>
    <div id="messageBox"></div>

    <div id="loginSection">
        <h2>🔐 लगइन गर्नुहोस्</h2>
        <input type="text" id="loginPhone" placeholder="फोन नम्बर हाल्नुहोस्">
        <input type="password" id="loginPass" placeholder="पासवर्ड">
        <button id="loginBtn">लगइन</button>
        <p style="text-align:right; font-size:13px; color:var(--primary); cursor:pointer; text-decoration: underline;" id="goForget">पासवर्ड बिर्सनुभयो?</p>
        <hr style="margin:20px 0; opacity: 0.2;">
        <p style="text-align:center;">खाता छैन? <b id="goReg" style="color:var(--primary); cursor:pointer; font-size: 18px;">खोल्नुहोस्</b></p>
    </div>

    <div id="registerSection" class="hidden">
        <h2>✍️ नयाँ खाता खोल्नुहोस्</h2>
        <input type="text" id="regName" placeholder="पूरा नाम">
        <input type="tel" id="regPhone"> <input type="date" id="regDob">
        <input type="email" id="regEmail" placeholder="इमेल (वैकल्पिक)">
        <input type="password" id="regPass" placeholder="बलियो पासवर्ड">
        <button id="sendOtpBtn">OTP पठाउनुहोस्</button>
        
        <div id="otpDiv" class="hidden">
            <input type="text" id="regOtp" placeholder="सिममा आएको ६ अंकको कोड">
            <button id="verifyRegBtn" style="background: #27ae60;">खाता पुष्टि गर्नुहोस्</button>
        </div>
        <p id="backLogin" style="text-align:center; cursor:pointer; margin-top:15px; color: #666;">← लगइनमा फर्कनुहोस्</p>
    </div>

    <div id="forgetSection" class="hidden">
        <h2>🔑 पासवर्ड बिर्सनुभयो?</h2>
        <input type="tel" id="forgetPhone">
        <button id="sendForgetOtpBtn">रिसेट कोड पठाउनुहोस्</button>
        <div id="forgetOtpDiv" class="hidden">
            <input type="text" id="forgetOtp" placeholder="OTP कोड">
            <input type="password" id="newPass" placeholder="नयाँ पासवर्ड हाल्नुहोस्">
            <button id="resetPassBtn">पासवर्ड अपडेट गर्नुहोस्</button>
        </div>
        <p id="backLogin2" style="text-align:center; cursor:pointer; margin-top:15px;">फर्कनुहोस्</p>
    </div>

    <div id="mainApp" class="hidden">
        <div class="nav-header">
            <h3>📝 डायरी / नोट</h3>
            <div class="vault-btn" id="openVault">Personal Vault 🔐</div>
        </div>
        <p id="welcomeUser" style="font-size: 14px; margin-bottom: 5px; color: #555;"></p>
        <textarea id="noteContent" rows="4" placeholder="यहाँ आफ्नो मनका कुरा, कविता वा नोट लेख्नुहोस्..."></textarea>
        <button id="saveNoteBtn">सुरक्षित गर्नुहोस्</button>
        <div id="notesList" style="margin-top:20px; max-height: 300px; overflow-y: auto;"></div>
        <button id="logoutBtn" style="background:#bdc3c7; color: #333; margin-top:20px;">लगआउट</button>
    </div>

    <div id="vaultPinSection" class="hidden">
        <h2 id="pinTitle">🔒 भल्ट सुरक्षा</h2>
        <p style="text-align:center; font-size: 13px; color: #777; margin-bottom: 10px;">तपाईंको निजी फोटो/भिडियो हेर्न पिन हाल्नुहोस्</p>
        <input type="password" id="vaultPin" maxlength="4" placeholder="४ अंकको सेक्रेट पिन" style="text-align:center; font-size: 24px; letter-spacing: 10px;">
        <button id="enterVaultBtn">भल्ट खोल्नुहोस्</button>
        <p id="forgetPin" style="text-align:center; color:red; cursor:pointer; margin-top:10px; font-size:12px;">पिन बिर्सनुभयो? रिसेट गर्नुहोस्</p>
        <button id="closePin" style="background:#eee; color: #333;">बन्द गर्नुहोस्</button>
    </div>

    <div id="vaultMediaSection" class="hidden">
        <div class="nav-header">
            <h3>🖼️ प्राइभेट ग्यालरी</h3>
            <button id="exitVault" style="width:auto; padding:5px 15px; background:var(--accent); margin:0;">निस्कनुहोस्</button>
        </div>
        <label style="font-size:13px; color:#666;">फोटो वा भिडियो थप्नुहोस्:</label>
        <input type="file" id="mediaUpload" accept="image/*,video/*">
        <div id="mediaGrid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px;"></div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/intlTelInput.min.js"></script>

<script type="module">
    // Firebase Imports
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, RecaptchaVerifier, signInWithPhoneNumber, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getStorage, ref, uploadBytesResumable, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

    // आफ्नो Firebase विवरण यहाँ हाल्नुहोस्
    const firebaseConfig = {
        apiKey: "AIzaSyDV7fx22nrD_lQ_52NYa_D8gWqSO-usXj4", 
        authDomain: "nepali-valut-d0c28.firebaseapp.com",
        projectId: "nepali-valut-d0c28",
        storageBucket: "nepali-valut-d0c28.appspot.com",
        messagingSenderId: "1011771345861",
        appId: "1:1011771345861:web:1fd6a024702355f6f299ac"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);

    let confirmationResult, currentUser;

    // UI Navigation Function (सबै बटनले काम गर्ने बनाउन)
    const show = (id) => {
        document.getElementById('loginSection').classList.add('hidden');
        document.getElementById('registerSection').classList.add('hidden');
        document.getElementById('forgetSection').classList.add('hidden');
        document.getElementById('mainApp').classList.add('hidden');
        document.getElementById('vaultPinSection').classList.add('hidden');
        document.getElementById('vaultMediaSection').classList.add('hidden');
        document.getElementById(id).classList.remove('hidden');
    };

    // Click Events
    document.getElementById('goReg').onclick = () => show('registerSection');
    document.getElementById('backLogin').onclick = () => show('loginSection');
    document.getElementById('backLogin2').onclick = () => show('loginSection');
    document.getElementById('goForget').onclick = () => show('forgetSection');
    document.getElementById('closePin').onclick = () => show('mainApp');
    document.getElementById('exitVault').onclick = () => show('mainApp');

    // Phone Input Initialization
    const itiReg = window.intlTelInput(document.querySelector("#regPhone"), { separateDialCode: true, initialCountry: "np" });
    const itiForget = window.intlTelInput(document.querySelector("#forgetPhone"), { separateDialCode: true, initialCountry: "np" });

    // --- Message Alert ---
    function msg(t, type) {
        const b = document.getElementById('messageBox');
        b.innerHTML = `<div class="msg ${type}">${t}</div>`;
        setTimeout(() => b.innerHTML = '', 5000);
    }

    // --- Recaptcha ---
    window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', { size: 'invisible' });

    // १. OTP पठाउने (दर्ता गर्दा)
    document.getElementById('sendOtpBtn').onclick = async () => {
        const phone = itiReg.getNumber();
        if(!phone) return msg("नम्बर हाल्नुहोस्", "error");
        try {
            confirmationResult = await signInWithPhoneNumber(auth, phone, window.recaptchaVerifier);
            document.getElementById('otpDiv').classList.remove('hidden');
            msg("तपाईंको सिममा OTP कोड पठाइएको छ।", "success");
        } catch (err) { msg(err.message, "error"); }
    };

    // २. खाता सिर्जना (OTP पुष्टि पछि)
    document.getElementById('verifyRegBtn').onclick = async () => {
        const otp = document.getElementById('regOtp').value;
        const name = document.getElementById('regName').value;
        const pass = document.getElementById('regPass').value;
        const email = document.getElementById('regEmail').value || `${Date.now()}@temp.com`;

        try {
            const result = await confirmationResult.confirm(otp);
            // Link phone with email/pass for life-time access
            const userCred = await createUserWithEmailAndPassword(auth, email, pass);
            await setDoc(doc(db, "users", userCred.user.uid), {
                name, phone: itiReg.getNumber(), email, vaultPin: null
            });
            msg("बधाई छ! खाता बन्यो। अब लगइन गर्नुहोस्।", "success");
            show('loginSection');
        } catch (err) { msg("OTP गलत छ वा समय सकियो।", "error"); }
    };

    // ३. लगइन
    document.getElementById('loginBtn').onclick = async () => {
        const email = document.getElementById('loginPhone').value; // Currently uses email as ID
        const pass = document.getElementById('loginPass').value;
        try {
            await signInWithEmailAndPassword(auth, email, pass);
            msg("लगइन सफल!", "success");
        } catch (err) { msg("इमेल वा पासवर्ड मिलेन।", "error"); }
    };

    // ४. अटो लगइन चेक
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            show('mainApp');
            const d = await getDoc(doc(db, "users", user.uid));
            if(d.exists()) document.getElementById('welcomeUser').innerText = "नमस्ते, " + d.data().name;
            loadNotes();
        } else {
            show('loginSection');
        }
    });

    // ५. नोट सेभ गर्ने
    document.getElementById('saveNoteBtn').onclick = async () => {
        const text = document.getElementById('noteContent').value;
        if(!text) return;
        await addDoc(collection(db, "users", currentUser.uid, "notes"), {
            text, timestamp: serverTimestamp()
        });
        document.getElementById('noteContent').value = '';
    };

    function loadNotes() {
        const q = query(collection(db, "users", currentUser.uid, "notes"), orderBy("timestamp", "desc"));
        onSnapshot(q, (snap) => {
            let h = '';
            snap.forEach(doc => {
                h += `<div style="background:#f1f1f1; padding:10px; border-radius:8px; margin-bottom:8px; font-size:15px;">${doc.data().text}</div>`;
            });
            document.getElementById('notesList').innerHTML = h || '<p style="color:#999; text-align:center;">अझै केही लेखिएको छैन।</p>';
        });
    }

    // ६. भल्ट खोल्ने र पिन सेट गर्ने
    document.getElementById('openVault').onclick = () => show('vaultPinSection');

    document.getElementById('enterVaultBtn').onclick = async () => {
        const pin = document.getElementById('vaultPin').value;
        if(pin.length < 4) return msg("४ अंकको पिन हाल्नुहोस्", "error");

        const userRef = doc(db, "users", currentUser.uid);
        const userDoc = await getDoc(userRef);
        const storedPin = userDoc.data().vaultPin;

        if (!storedPin) {
            await updateDoc(userRef, { vaultPin: pin });
            msg("नयाँ पिन सेट गरियो!", "success");
            show('vaultMediaSection');
            loadMedia();
        } else if (storedPin === pin) {
            show('vaultMediaSection');
            loadMedia();
        } else {
            msg("गलत पिन! फेरि प्रयास गर्नुहोस्।", "error");
        }
    };

    // ७. मिडिया अपलोड (Photo/Video)
    document.getElementById('mediaUpload').onchange = async (e) => {
        const file = e.target.files[0];
        if(!file) return;
        msg("अपलोड हुँदैछ...", "success");

        const path = `vault/${currentUser.uid}/${Date.now()}_${file.name}`;
        const sRef = ref(storage, path);
        await uploadBytesResumable(sRef, file);
        const url = await getDownloadURL(sRef);

        await addDoc(collection(db, "users", currentUser.uid, "media"), {
            url, path, type: file.type.startsWith('image') ? 'img' : 'vid'
        });
        msg("अपलोड सफल!", "success");
    };

    function loadMedia() {
        onSnapshot(collection(db, "users", currentUser.uid, "media"), (snap) => {
            let h = '';
            snap.forEach(d => {
                const data = d.data();
                if(data.type === 'img') {
                    h += `<div style="position:relative;"><img src="${data.url}" style="width:100%; border-radius:10px; height:150px; object-fit:cover;"><button onclick="window.open('${data.url}')" style="padding:2px; font-size:10px;">Full View</button></div>`;
                } else {
                    h += `<div><video src="${data.url}" controls style="width:100%; border-radius:10px; height:150px; object-fit:cover;"></video></div>`;
                }
            });
            document.getElementById('mediaGrid').innerHTML = h;
        });
    }

    document.getElementById('logoutBtn').onclick = () => signOut(auth);
</script>

</body>
</html>
